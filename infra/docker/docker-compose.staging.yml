services:
  db:
    image: postgres:16
    container_name: bfs_db_staging
    environment:
      POSTGRES_DB: bfs_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - bfs_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bfs_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../apps/backend
    container_name: bfs_backend_staging
    env_file:
      - ../../.env.staging
    environment:
      DATABASE_URL: "postgresql+asyncpg://postgres:postgres@db:5432/bfs_staging"
      DATABASE_URL_SYNC: "postgresql://postgres:postgres@db:5432/bfs_staging"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../../apps/frontend
    container_name: bfs_frontend_staging
    environment:
      VITE_API_URL: "http://localhost:8001/api/v1"
    ports:
      - "3001:5173"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  bfs_staging_data:
